<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЭлектроСклад — Управление</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">⚡</div>
        <div>
          <div class="brand-title">ЭлектроСклад</div>
          <div class="brand-sub">Система управления</div>
        </div>
      </div>
      <nav id="sidebar-nav"></nav>
    </aside>

    <div class="content">
      <header class="topbar">
        <div id="breadcrumb" class="breadcrumb">Главная</div>
        <button class="btn-icon" id="clear-all-btn" title="Очистить все данные">🗑</button>
      </header>

      <main class="main-area" id="main-area">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">⚡</div>
          <h2>Добро пожаловать в ЭлектроСклад</h2>
          <p>Выберите тип продукта или услуги в меню слева, чтобы начать добавлять записи.</p>
          <div class="stats-grid" id="stats-grid"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
